name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract:
    name: Contract 1.2.0
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Checkout pinned private provider
        uses: actions/checkout@v7
        with:
          repository: drkliu/jimu
          ref: bf130c33ba3d47bb7239d238b241b853df72f24e
          path: .provider
          ssh-key: ${{ secrets.JIMU_PROVIDER_DEPLOY_KEY }}
          persist-credentials: false
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
      - name: Verify pinned provider artifacts
        run: cd .provider && go run ./cmd/jimuctl studio verify --dir ../contracts/studio/v1

  quality:
    name: Go quality
    needs: contract
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: jimu
          POSTGRES_PASSWORD: jimu
          POSTGRES_DB: jimu_studio_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U jimu"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      JIMU_TEST_PG_DSN: postgres://jimu:jimu@127.0.0.1:5432/jimu_studio_test?sslmode=disable
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
      - name: Verify formatting
        run: test -z "$(gofmt -l .)"
      - name: Vet
        run: go vet ./...
      - name: Unit and race tests
        run: go test -race -coverprofile=coverage.out ./...
      - name: Build
        run: go build ./cmd/studio
      - uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: error

  browser:
    name: Go browser E2E
    needs: contract
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: jimu
          POSTGRES_PASSWORD: jimu
          POSTGRES_DB: jimu_studio_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U jimu"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      JIMU_TEST_PG_DSN: postgres://jimu:jimu@127.0.0.1:5432/jimu_studio_test?sslmode=disable
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
      - name: Browser smoke and accessibility structure
        run: go test -tags=e2e -timeout=2m ./e2e

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    needs: contract
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: moderate

  vulnerability:
    name: Vulnerability scan
    needs: contract
    permissions:
      contents: read
      security-events: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
      - uses: golang/govulncheck-action@v1
        with:
          go-package: ./...
